name: Pipeline CI/CD ÉcoShop Intégral

# Le pipeline écoute absolument tout le monde
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ==========================================
  # ÉTAPE 1 : QUALITÉ (S'exécute toujours)
  # ==========================================
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Installer et Lancer les Linters
        run: |
          npm install -g htmlhint
          npm install --save-dev eslint stylelint stylelint-config-standard
      #          htmlhint "**/*.html"
      #          npx stylelint "**/*.css"
      #          npx eslint "**/*.js"
      # 4. Validation HTML (Vérifie les balises non fermées, les ID en double, les attributs manquants)
      - name: Contrôle HTML
        run: htmlhint "**/*.html"

      # 5. Validation CSS (Détecte les erreurs de syntaxe et propriétés invalides)
      #      - name: Contrôle CSS
      #        run: npx stylelint "**/*.css"

      # 6. Validation JavaScript (Détecte les variables non utilisées, les points-virgules manquants, la syntaxe cassée)
  #      - name: Contrôle JavaScript
  #        run: npx eslint "**/*.js"
  # ==========================================
  # ÉTAPE 2 : PERFORMANCE (S'exécute toujours)
  # ==========================================
  perf-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Serveur local
        run: |
          python3 -m http.server 8080 &
          sleep 3
      - name: Vérification du Budget
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/index.html
          #            http://localhost:8080/dashboard.html
          budgetPath: ./lighthouse-budget.json
          uploadArtifacts: true

  # ==========================================
  # ÉTAPE 3 : DÉPLOIEMENT TEST (GitHub Pages)
  # ==========================================





  deploy-to-staging:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [quality-check, perf-audit]
    # 🎯 FILTRE : Uniquement si on est sur la branche 'test'
    if: github.event_name == 'push' && github.ref == 'refs/heads/test'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5



  # ==========================================
  # ÉTAPE 4 : DÉPLOIEMENT PROD (Serveur SFTP)
  # ==========================================
  deploy-to-production:
    runs-on: ubuntu-latest
    # 🛡️ SÉCURITÉ : Attend aussi la réussite de la Qualité ET de la Perf
    needs: [quality-check, perf-audit]
    # 🎯 FILTRE : Uniquement si on est sur 'main' ou 'master'
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - name: Nettoyage des dossiers de développement (.git, .github)
        run: rm -rf .git .github .idea node_modules *.json .* eslint* package* light*
      - name: Déploiement Production SFTP Sovereign
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_SERVER }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          local_path: './'
          remote_path: ${{ secrets.REMOTE_PATH }}
          ssh_private_key: ''